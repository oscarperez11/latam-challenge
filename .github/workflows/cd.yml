name: 'Continuous Delivery'

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/latam-challenge/api:latest \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/latam-challenge/api:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/latam-challenge/api:latest
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/latam-challenge/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy latam-challenge-api \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/latam-challenge/api:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10
